<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="fonts/style.css">
  <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.4.2/css/all.css">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
  <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.4.2/css/all.css" />

  <link href="https://fonts.googleapis.com/css?family=Montserrat:700,500&display=swap" rel="stylesheet" />
</head>

<link rel="stylesheet" href="style.css">

<body>
  <div class="profil">
    <img class="banner" src="https://nxtcloud999.isfucking.pro/ZcsQz9.gif" id="banner-dui" />
    <div class="avatar">
      <img class="avatar" src="https://nxtcloud999.isfucking.pro/GfpYYR.gif" id="avatar-dui" />
    </div>

    <p class="p1" id="name-dui">Loading...</p>
    <div class="profile-head">
      <p class="p2" id="permid-dui">Loading...</p>
      <div class="servergroup" id="group-dui">Head Developer</div>
    </div>

    <div class="stats">
      <div class="item">
        <div class="ring1">
          <svg viewBox="0 0 99 99" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="49.5" cy="49.5" r="48.5" stroke="white" stroke-opacity="0.25" stroke-width="2" />
          </svg>
        </div>
        <div class="ring2">
          <p>K/D</p>
          <span id="kd-dui">Loading...</span>
          <svg width="80%" height="80%" viewBox="0 0 77 78" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="38.5" cy="39" rx="38.5" ry="39" fill="#D9D9D9" fill-opacity="0.06" />
          </svg>
        </div>
      </div>
      <div class="item">
        <div class="ring1">
          <svg viewBox="0 0 99 99" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="49.5" cy="49.5" r="48.5" stroke="white" stroke-opacity="0.25" stroke-width="2" />
          </svg>
        </div>
        <div class="ring2">
          <p>KILLS</p>
          <span id="kills-dui">Loading...</span>
          <svg width="80%" height="80%" viewBox="0 0 77 78" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="38.5" cy="39" rx="38.5" ry="39" fill="#D9D9D9" fill-opacity="0.06" />
          </svg>
        </div>
      </div>
      <div class="item">
        <div class="ring1">
          <svg viewBox="0 0 99 99" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="49.5" cy="49.5" r="48.5" stroke="white" stroke-opacity="0.25" stroke-width="2" />
          </svg>
        </div>
        <div class="ring2">
          <p>TODE</p>
          <span id="deaths-dui">Loading...</span>
          <svg width="80%" height="80%" viewBox="0 0 77 78" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="38.5" cy="39" rx="38.5" ry="39" fill="#D9D9D9" fill-opacity="0.06" />
          </svg>
        </div>
      </div>
    </div>

    <div class="badge">
      <div class="badge-item">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M9.6 0C9.06 0 8.4 0.6 8.4 1.2H3.6C3.6 0.6 2.94 0 2.4 0H0V5.4C0 6 0.6 6.6 1.2 6.6H2.52C2.76 7.8 3.54 8.82 5.4 9V10.248C3.6 10.524 3.6 12 3.6 12H8.4C8.4 12 8.4 10.524 6.6 10.248V9C8.46 8.82 9.24 7.8 9.48 6.6H10.8C11.4 6.6 12 6 12 5.4V0H9.6ZM2.4 5.4H1.2V1.2H2.4V5.4ZM10.8 5.4H9.6V1.2H10.8V5.4Z"
            fill="white" fill-opacity="0.4" />
        </svg>
        <span id="trophaen-dui">Loading...</span>
      </div>
      <div class="badge-item">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M5.2 0H7.8C8.14478 0 8.47544 0.144172 8.71924 0.400801C8.96304 0.65743 9.1 1.00549 9.1 1.36842V2.73684H11.7C12.0448 2.73684 12.3754 2.88101 12.6192 3.13764C12.863 3.39427 13 3.74234 13 4.10526V11.6316C13 11.9945 12.863 12.3426 12.6192 12.5992C12.3754 12.8558 12.0448 13 11.7 13H1.3C0.5785 13 0 12.3842 0 11.6316V4.10526C0 3.34579 0.5785 2.73684 1.3 2.73684H3.9V1.36842C3.9 0.608947 4.4785 0 5.2 0ZM7.8 2.73684V1.36842H5.2V2.73684H7.8Z"
            fill="white" fill-opacity="0.5" />
        </svg>

        <span id="job-dui">Loading...</span>
      </div>
    </div>

    <div class="zitat">
      <span id="zitat-dui">Loading...</span>
    </div>
  </div>

  <script src="load.js"></script>

</html>
